type Campaign @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  targetAmount: BigInt!
  deadline: BigInt!
  metadataCID: String!
  createdAtBlock: BigInt!
  totalRaised: BigInt!
  donations: [Donation!]! @derivedFrom(field: "campaign")
}

type Donation @entity(immutable: true) {
  id: ID!
  campaign: Campaign!
  from: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}
