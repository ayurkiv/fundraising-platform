specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: CampaignFactory
    network: polygon-amoy
    source:
      address: "0x786D1879f0b1d8ceE37D4e2adb96F757dEB2ED46"
      abi: CampaignFactory
      startBlock: 30877400
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Campaign
      abis:
        - name: CampaignFactory
          file: CampaignFactory/CampaignFactory.json
        - name: Campaign
          file: CampaignFactory/Campaign.json
      eventHandlers:
        - event: CampaignCreated(indexed address,indexed address,uint256,uint256,string)
          handler: handleCampaignCreated
      file: CampaignFactory/CampaignFactory.wasm
templates:
  - kind: ethereum
    name: Campaign
    network: polygon-amoy
    source:
      abi: Campaign
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Campaign
        - Donation
      abis:
        - name: Campaign
          file: Campaign/Campaign.json
      eventHandlers:
        - event: Donation(indexed address,uint256,uint256)
          handler: handleDonation
      file: templates/Campaign/Campaign.wasm
