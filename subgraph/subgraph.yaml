specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: CampaignFactory
    network: polygon-amoy
    source:
      address: "0x9E02129932dEcC5C6a9C68a06e29c7a082ab091d"
      abi: CampaignFactory
      startBlock: 35924601
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Campaign
      abis:
        - name: CampaignFactory
          file: ./abis/CampaignFactory.json
        - name: Campaign
          file: ./abis/Campaign.json
      eventHandlers:
        - event: CampaignCreated(indexed address,indexed address,uint256,uint256,string)
          handler: handleCampaignCreated
      file: ./src/mapping.ts

templates:
  - kind: ethereum
    name: Campaign
    network: polygon-amoy
    source:
      abi: Campaign
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Campaign
        - Donation
      abis:
        - name: Campaign
          file: ./abis/Campaign.json
      eventHandlers:
        - event: Donation(indexed address,uint256,uint256)
          handler: handleDonation
      file: ./src/campaign.ts
